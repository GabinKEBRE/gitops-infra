---
# tasks file for roles/common
# Activer EPEL FIRST
- name: S'assurer qu'un DNS fonctionnel est configuré
  ansible.builtin.copy:
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'

- name: Enable EPEL repository (RedHat family)
  package:
    name: epel-release
    state: present
  when: ansible_os_family == "RedHat"

# Refresh cache après ajout repo
- name: Update packages
  package:
    name: "*"
    state: latest

# Debian packages
- name: Install packages Debian
  package:
    name: "{{ common_packages_debian }}"
    state: present
  when: ansible_os_family == "Debian"

# RedHat packages
- name: Install packages RedHat
  package:
    name: "{{ common_packages_redhat }}"
    state: absent
  when: ansible_os_family == "RedHat"

# 1. Configuration des dépôts officiels Zabbix selon la distribution
- name: Installer le dépôt Zabbix sur Debian/Ubuntu
  ansible.builtin.apt_repository:
    repo: "deb https://repo.zabbix.com/zabbix/7.0/debian bookworm main" # Ajuste la version de Zabbix (ex: 7.0) et de ton OS
    state: present
  when: ansible_os_family == "Debian"

- name: Installer le dépôt Zabbix sur RedHat/Rocky
  ansible.builtin.dnf:
    name: "https://repo.zabbix.com/zabbix/7.0/rhel/9/x86_64/zabbix-release-latest.el9.noarch.rpm" # Ajuste selon ta version RHEL
    state: present
    disable_gpg_check: true
  when: ansible_os_family == "RedHat"

# 2. Installation des paquets (Mise à jour de tes tâches existantes)
- name: Installer les paquets communs sous Debian
  ansible.builtin.apt:
    name: "{{ common_packages_debian }}"
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Installer les paquets communs sous RedHat
  ansible.builtin.dnf:
    name: "{{ common_packages_redhat }}"
    state: present
  when: ansible_os_family == "RedHat"

# 3. Déploiement de la configuration et gestion du service Zabbix
- name: Déployer la configuration de Zabbix Agent 2
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Zabbix Agent

- name: S'assurer que le service Zabbix Agent 2 est démarré et activé
  ansible.builtin.systemd:
    name: zabbix-agent2
    state: started
    enabled: yes

- name: Create admin user
  user:
    name: "{{ admin_user }}"
    groups: "{{ admin_group_map[ansible_os_family] }}"
    append: yes
    shell: /bin/bash
    create_home: yes

